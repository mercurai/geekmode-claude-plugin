name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint JSON files (jq)
        run: |
          echo "Checking .claude-plugin/marketplace.json..."
          jq . .claude-plugin/marketplace.json > /dev/null && echo ".claude-plugin/marketplace.json: OK"
          echo "Checking plugins/geekmode-rust/.claude-plugin/plugin.json..."
          jq . plugins/geekmode-rust/.claude-plugin/plugin.json > /dev/null && echo "plugins/geekmode-rust/.claude-plugin/plugin.json: OK"
          echo "Checking plugins/geekmode-rust/package.json..."
          jq . plugins/geekmode-rust/package.json > /dev/null && echo "plugins/geekmode-rust/package.json: OK"
          echo "Checking plugins/geekmode-rust/hooks/hooks.json..."
          jq . plugins/geekmode-rust/hooks/hooks.json > /dev/null && echo "plugins/geekmode-rust/hooks/hooks.json: OK"

      - name: Validate marketplace.json required fields
        run: |
          jq -e '
            .name and .owner and
            (.plugins | type == "array") and
            (.plugins | length > 0) and
            (.plugins[0].name and .plugins[0].source and .plugins[0].description)
          ' .claude-plugin/marketplace.json > /dev/null && echo "marketplace.json schema: OK"

      - name: Validate plugin.json required fields
        run: |
          jq -e '
            .name and .version and .description and .author and .homepage and .license
          ' plugins/geekmode-rust/.claude-plugin/plugin.json > /dev/null && echo "plugin.json schema: OK"

      # Note: `claude plugins validate` requires the Claude Code CLI, which is not
      # available in GitHub Actions runners. The jq checks above provide equivalent
      # syntactic and structural validation for CI. Run `claude plugins validate`
      # locally before publishing a release.
